aid: dex
name: Dex
description: >-
  A federated OpenID Connect provider that connects to other identity providers
  through connectors, enabling authentication for applications without handling
  passwords directly. Dex acts as a portal to other identity providers through
  connectors, making it easy to implement SSO across multiple providers.
